services:
  api:
    build: { context: ../.., dockerfile: src/Api/Dockerfile }
    ports: ["8080:8080"]
  frontend:
    build: { context: ../../src/Frontend }
    ports: ["3000:3000"]
  postgres:
    image: postgres:16
    environment: { POSTGRES_PASSWORD: postgres, POSTGRES_DB: architect }
  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
  redis:
    image: redis:7-alpine
